<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>html-to-pdf-crab-js WASM example</title>
    <script type="module" src="./browser.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">WASM browser example</p>
          <h1>html-to-pdf-crab-js</h1>
        </div>
        <div class="actions">
          <button id="render-pdf" type="button">Render PDF</button>
          <a id="download-pdf" aria-disabled="true">Download</a>
        </div>
      </header>

      <p id="status" class="status">Loading WASM renderer...</p>

      <section class="panes" aria-label="HTML and PDF comparison">
        <article class="pane">
          <div class="pane-header">
            <h2>HTML source</h2>
            <a href="../invoice.html" target="_blank" rel="noreferrer">Open HTML</a>
          </div>
          <iframe id="html-preview" title="Invoice HTML preview" src="../invoice.html"></iframe>
        </article>

        <article class="pane">
          <div class="pane-header">
            <h2>Rendered PDF</h2>
            <span id="pdf-size">Waiting</span>
          </div>
          <iframe id="pdf-preview" title="Rendered PDF preview"></iframe>
        </article>
      </section>
    </main>
  </body>
</html>

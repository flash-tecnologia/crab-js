
[package]
authors = ["Inaiat <inaiatgmail.com>"]
edition = "2021"
name = "pdf_crab_js"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.9.0"
napi-derive = "3.5.6"
printpdf = { version = "0.9.1", default-features = false, features = [
  "html",
  "html_multithreaded",
  "text_layout",
  "text_layout_hyphenation",
  "images",
  "bmp",
  "dds",
  "gif",
  "hdr",
  "ico",
  "jpeg",
  "png",
  "pnm",
  "rayon",
  "tga",
  "tiff",
  "webp",
  "svg",
] }

[build-dependencies]
napi-build = { version = "2.3.2" }

[profile.release]
lto = true
strip = "symbols"

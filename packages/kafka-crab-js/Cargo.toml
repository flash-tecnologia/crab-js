[package]
edition = "2021"
name = "kafka-crab-js"
version = "2.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Default enable napi4 feature, see https://nodejs.org/api/n-api.html#node-api-version-matrix
napi = { version = "3.8.5", default-features = false, features = [
  "napi9",
  "napi10",
  "tokio_rt",
  "serde-json",
  "web_stream",
] }
napi-derive = "3.5.4"

anyhow = { version = "1.0", features = ["backtrace"] }
dashmap = "6.1"

rdkafka = { version = "0.39", default-features = false, features = [
  "libz-static",
  "cmake-build",
  "tokio",
  "ssl-vendored",
  "curl-static",
] }
tokio = { version = "1.52.1", features = ["full"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }
nanoid = "0.5"
serde_json = "1.0"
futures-util = "0.3"

[build-dependencies]
napi-build = { version = "2.3.1" }

[profile.release]
lto = true
strip = "symbols"

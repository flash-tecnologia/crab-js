name: CI
env:
  DEBUG: napi:*
  APP_NAME: kafka-crab-js
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
permissions:
  contents: write
  id-token: write
'on':
  push:
    tags:
      - 'kafka-crab-js@*'
      - 'kafka-crab-js-otel@*'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install

      - name: ESLint
        run: pnpm lint

      - name: Cargo fmt
        working-directory: packages/kafka-crab-js
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: packages/kafka-crab-js
        run: cargo clippy

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin
          - host: ubuntu-22.04 # Need to fix test GLIB 2.35
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            container_image: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
            build: pnpm build --target x86_64-unknown-linux-musl
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            build: pnpm build --target aarch64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            container_image: ghcr.io/rust-cross/rust-musl-cross:aarch64-unknown-linux-musl
            build: |
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-unknown-linux-musl-gcc
              pnpm build --target aarch64-unknown-linux-musl
    name: stable - ${{ matrix.settings.target }} - node@22
    runs-on: ${{ matrix.settings.host }}
    container: ${{ matrix.settings.container_image || '' }}
    defaults:
      run:
        working-directory: packages/kafka-crab-js
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Clean rustup toolchain
        run: rustup toolchain uninstall stable || true
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            packages/kafka-crab-js/target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: pnpm install --filter kafka-crab-js
        working-directory: .
      - name: Setup node x86
        uses: actions/setup-node@v4
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 24
          cache: pnpm
          architecture: x86
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact Dist
        uses: actions/upload-artifact@v4
        # copy dist folder only one time
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        with:
          name: dist-kafka-crab-js
          path: packages/kafka-crab-js/dist
          if-no-files-found: error
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            packages/kafka-crab-js/*.node
            packages/kafka-crab-js/dist
          if-no-files-found: error
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/kafka-crab-js/*.wasm
          if-no-files-found: error

  build-otel:
    name: Build OTEL Package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/kafka-crab-js-otel@') || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build core package first
        run: pnpm build
        working-directory: packages/kafka-crab-js
      - name: Build OTEL package
        run: pnpm build
        working-directory: packages/otel
      - name: Upload OTEL dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-kafka-crab-js-otel
          path: 'packages/otel/dist/**/*'
          if-no-files-found: error

  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
        node:
          - '20'
          - '22'
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: ${{ matrix.settings.architecture }}
      - name: Install dependencies
        run: pnpm install --filter kafka-crab-js
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/kafka-crab-js
      - name: List packages
        run: ls -R packages/kafka-crab-js
        shell: bash
      - name: Test bindings
        run: pnpm test
        working-directory: packages/kafka-crab-js

  test-linux-binding:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
        node:
          - '20'
          - '22'
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else if ('${{ matrix.target }}'.startsWith('armv7')) {
              console.log('PLATFORM=linux/arm/v7')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> $GITHUB_OUTPUT
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> $GITHUB_OUTPUT
          echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      # use --force to download the all platform/arch dependencies
      - name: Install dependencies
        run: pnpm install --force
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: bindings-${{ matrix.target }}
          path: packages/kafka-crab-js
      - name: List packages
        run: ls -R packages/kafka-crab-js
        shell: bash
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: ${{ contains(matrix.target, 'armv7') }}
        with:
          platforms: all
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: ${{ contains(matrix.target, 'armv7') }}
      - name: Test bindings
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          options: -v ${{ steps.docker.outputs.PNPM_STORE_PATH }}:${{ steps.docker.outputs.PNPM_STORE_PATH }} -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }}/packages/kafka-crab-js --platform ${{ steps.docker.outputs.PLATFORM }}
          run: npm run test

  publish-kafka-crab-js:
    name: Publish kafka-crab-js
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/kafka-crab-js@')
    needs:
      - lint
      - test-macOS-windows-binding
      - test-linux-binding
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: create npm dirs
        run: pnpm napi create-npm-dirs
        working-directory: packages/kafka-crab-js
      - name: Move artifacts
        run: pnpm napi artifacts --output-dir $GITHUB_WORKSPACE/artifacts
        working-directory: packages/kafka-crab-js
      - name: Copy dist
        run: |
          mkdir -p packages/kafka-crab-js/dist
          cp -R artifacts/dist-kafka-crab-js/* packages/kafka-crab-js/dist/ || true
      - name: List artifacts
        run: ls -R packages/kafka-crab-js
        shell: bash
      - name: Publish kafka-crab-js
        working-directory: packages/kafka-crab-js
        run: |
          npm config set provenance true
          TAG_NAME=${GITHUB_REF#refs/tags/kafka-crab-js@}
          echo "Publishing kafka-crab-js version: $TAG_NAME"
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc

          if [[ $TAG_NAME =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable release detected"
            npm publish --access public
          elif [[ $TAG_NAME =~ alpha ]]; then
            echo "Alpha release detected"
            npm publish --tag alpha --access public
          elif [[ $TAG_NAME =~ beta ]]; then
            echo "Beta release detected"
            npm publish --tag beta --access public
          elif [[ $TAG_NAME =~ rc ]]; then
            echo "Release candidate detected"
            npm publish --tag rc --access public
          else
            echo "Pre-release detected"
            npm publish --tag next --access public
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-kafka-crab-js-otel:
    name: Publish kafka-crab-js-otel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/kafka-crab-js-otel@')
    needs:
      - lint
      - build-otel
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Download OTEL dist
        uses: actions/download-artifact@v4
        with:
          name: dist-kafka-crab-js-otel
          path: packages/otel/dist
      - name: List artifacts
        run: ls -R packages/otel
        shell: bash
      - name: Publish kafka-crab-js-otel
        working-directory: packages/otel
        run: |
          npm config set provenance true
          TAG_NAME=${GITHUB_REF#refs/tags/kafka-crab-js-otel@}
          echo "Publishing kafka-crab-js-otel version: $TAG_NAME"
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc

          if [[ $TAG_NAME =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable release detected"
            npm publish --access public
          elif [[ $TAG_NAME =~ alpha ]]; then
            echo "Alpha release detected"
            npm publish --tag alpha --access public
          elif [[ $TAG_NAME =~ beta ]]; then
            echo "Beta release detected"
            npm publish --tag beta --access public
          elif [[ $TAG_NAME =~ rc ]]; then
            echo "Release candidate detected"
            npm publish --tag rc --access public
          else
            echo "Pre-release detected"
            npm publish --tag next --access public
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
